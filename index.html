<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sammyhu-Dec Tools</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f3;
            --card: #ffffff;
            --text: #17201c;
            --muted: #65736d;
            --accent: #0f766e;
            --accent-strong: #115e59;
            --border: #d8e3dd;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Noto Sans SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(960px, 100%);
            margin: 0 auto;
            padding: clamp(20px, 4vw, 56px) 0;
        }
        .eyebrow {
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin: 0 0 12px;
        }
        h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 44px);
            line-height: 1.08;
        }
        p {
            margin: 16px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }
        .intro {
            max-width: 720px;
        }
        .tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 32px;
        }
        .tool-card {
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--card);
            padding: 22px;
            box-shadow: 0 16px 48px rgba(23, 32, 28, 0.08);
        }
        .tool-card h2 {
            margin: 0;
            font-size: 22px;
        }
        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .tag {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 5px 10px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            background: #f9fbf8;
        }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 28px;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            text-decoration: none;
        }
        a:hover {
            background: var(--accent-strong);
        }
    </style>
</head>
<body>
    <main>
        <section class="intro">
            <p class="eyebrow">Personal Tools</p>
            <h1>sammyhu-Dec 工具站</h1>
            <p>这里用于整理和发布一些可以直接在浏览器中使用的小工具。当前工具以静态页面形式托管在 GitHub Pages 上。</p>
        </section>

        <section class="tools" aria-label="工具列表">
            <article class="tool-card">
                <p class="eyebrow">Finance</p>
                <h2>HSBC 多币种余额计算器</h2>
                <p>用于估算 HSBC One / HSBC Premier 三个月平均全面理财总值要求，并支持将常见外币折算为港币参与计算。</p>
                <div class="tag-row" aria-label="工具标签">
                    <span class="tag">HSBC One</span>
                    <span class="tag">HSBC Premier</span>
                    <span class="tag">多币种</span>
                </div>
                <a href="./tools/hsbc-multi-currency-balance-calculator/">打开计算器</a>
            </article>
        </section>
    </main>
</body>
</html>
