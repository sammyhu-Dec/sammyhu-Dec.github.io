<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sammyhu-Dec GitHub Pages</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f3;
            --card: #ffffff;
            --text: #17201c;
            --muted: #65736d;
            --accent: #0f766e;
            --border: #d8e3dd;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, "Noto Sans SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            width: min(760px, 100%);
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--card);
            padding: clamp(24px, 5vw, 44px);
            box-shadow: 0 16px 48px rgba(23, 32, 28, 0.08);
        }
        .eyebrow {
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin: 0 0 12px;
        }
        h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 44px);
            line-height: 1.08;
        }
        p {
            margin: 16px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 28px;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            font-weight: 700;
            text-decoration: none;
        }
        a:hover {
            background: #0d5f59;
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">Project Directory</p>
        <h1>HSBC Multi-Currency Balance Calculator</h1>
        <p>一个用于估算 HSBC One / HSBC Premier 三个月平均全面理财总值要求的多币种余额计算工具。</p>
        <a href="./hsbc-multi-currency-balance-calculator/">打开计算器</a>
    </main>
</body>
</html>
